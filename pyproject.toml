[tool.ruff]

#include the directories you want to ignore 

exclude = [
    
]

#same as Black 
line-length = 88
indent-width = 4

#assume python 3.12
target-version = py312

[tool.ruff.lint]
#select the tools for linting
# F = enable Pyflakes, E = enable pycodestyle, McCabe complexity ('C901')

select = ["E4", "E7", "E9", "F"]
ignore = []

#allow fix for all enabled rules when '--fix' is used
fixable = ["ALL"]
unfixable = []

#allow unused variables when underscore_prefixed
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"



[tool.ruff.format]
# use double quotes like Black
quote-style = "double"

#like Black, indent with spaces rather than tabs
indent-style = "space"

#respect magic trailing commas
skip-magic-trailing-comma = false

#detect appropriate line ending 
line-ending = "auto"

docstring-code-format = false

#only work if the above is true 
docstring-code-line-length = "dynamic"

#line length standard 
[tool.ruff]
lint.select = ["ALL"]
lint.ignore = [
    "D203", # One blank line before class docstring
    "D212",    # Multi-line summary first line
    "PLR0913", # Too many arguments
    "Q000",    # Single quotes found but double quotes preferred
]
line-length = 120
show-fixes = true
src = ["src",]
target-version = "py39" # Minimum version linter changes must be valid for